<!--
  BARTLETT'S ORDER & INVENTORY SYSTEM — v2.0 (clean rebuild)
  © 2025 Oscar Rivas. All rights reserved. Bartlett's Restaurant, Austin TX.

  ARCHITECTURE (why this version doesn't crash):
  · Single source of truth: one `state` object. Firebase is authoritative,
    localStorage is a cache, in-memory state is the working copy.
  · Write path: mutate state -> saveLocal() -> pushRemote(). Instant UI, then sync.
  · Echo guard: after any local write to a key, incoming Firebase updates for
    that key are ignored for 2s. This kills the race conditions that caused
    the old app's data to flip-flop and crash.
  · One render() pipeline. No per-item flags gating visibility. Every catalog
    item shows in every relevant view. (The old `inventoryOnly` flag is gone.)
  · Pure functions for all inventory/order math, unit-tested in the console.
-->

/* ═══════════════════════════════════════════════════════════════════
   BARTLETT'S — VISUAL SYSTEM
   Grounded in the back-of-house: expo tickets, prep sheets, line-cook
   signal color. Near-black service floor, ember accent, ticket-white
   for emphasis, tabular numerals so totals line up like a receipt.
   ═══════════════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Fjalla+One&family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@500;700&display=swap');

:root{
  /* Core surfaces — warm near-black, not blue-slate */
  --ink:#0c0c0d; --panel:#18171b; --panel2:#221f25; --line:#332f37;
  --txt:#f4f1ea; --dim:#9a9299;

  /* Signal palette — expo line vocabulary */
  --ember:#ff6b35; --ember-dim:#c9502228;
  --ok:#4fa65b; --ok-dim:#4fa65b22;
  --low:#e8a33d; --low-dim:#e8a33d22;
  --crit:#e14b4b; --crit-dim:#e14b4b22;
  --purple:#a78bd6;
  --paper:#f4f1ea;

  /* Legacy aliases so every existing binding keeps working */
  --bg:var(--ink); --accent:var(--ember);

  --r:10px; --r-lg:16px;
  --shadow-card:0 1px 2px rgba(0,0,0,.4), 0 8px 24px -12px rgba(0,0,0,.6);
  --shadow-pop:0 12px 40px -8px rgba(0,0,0,.7);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--ink);color:var(--txt);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  -webkit-text-size-adjust:100%;overflow-x:hidden;
  font-feature-settings:"tnum" 1,"cv11" 1;}
body{padding-bottom:92px;
  background-image:
    radial-gradient(ellipse 900px 500px at 15% -10%, rgba(255,107,53,.05), transparent),
    radial-gradient(ellipse 700px 400px at 100% 0%, rgba(167,139,214,.04), transparent);
  background-attachment:fixed;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
h1,h2,h3{font-family:'Fjalla One','Arial Narrow',-apple-system,sans-serif;
  font-weight:600;letter-spacing:.01em}

/* ── Top bar: ticket header ── */
.topbar{position:sticky;top:0;z-index:40;background:rgba(24,23,27,.92);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);padding:16px 18px 14px;
  display:flex;align-items:center;justify-content:space-between}
.topbar h1{margin:0;font-size:21px;font-weight:400;letter-spacing:.02em;color:var(--paper)}
.topbar .sub{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--dim);
  margin-top:3px;letter-spacing:.08em;text-transform:uppercase}
.sync-badge{font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:.04em;
  padding:6px 11px 6px 9px;border-radius:20px;font-weight:700;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;border:1px solid transparent}
.sync-badge.synced{background:var(--ok-dim);color:var(--ok);border-color:#4fa65b3d}
.sync-badge.syncing{background:var(--ember-dim);color:var(--ember);border-color:#ff6b353d}
.sync-badge.offline,.sync-badge.error{background:var(--crit-dim);color:var(--crit);border-color:#e14b4b3d}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.sync-badge.syncing .sync-dot{animation:pulse 1.1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.75)}}

/* ── Supplier pills: ticket tabs ── */
.supbar{display:flex;gap:8px;padding:14px 18px 12px;overflow-x:auto;
  scrollbar-width:none;background:var(--ink)}
.supbar::-webkit-scrollbar{display:none}
.sup-pill{flex:0 0 auto;padding:9px 16px;border-radius:8px;font-size:12px;
  font-weight:700;font-family:'Roboto Mono',monospace;letter-spacing:.05em;text-transform:uppercase;
  background:var(--panel);color:var(--dim);white-space:nowrap;
  border:1px solid var(--line);transition:transform .12s ease,border-color .12s ease}
.sup-pill.active{border-color:transparent;box-shadow:var(--shadow-card);font-weight:800}
.sup-pill:active{transform:scale(.96)}

/* ── Content ── */
.content{padding:10px 14px 24px}
.sched{font-size:12.5px;color:var(--dim);padding:8px 2px 14px;line-height:1.55}
.sched b{color:var(--txt);font-weight:600}

/* ── Item rows: prep-sheet lines ── */
.item{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow-card);position:relative;overflow:hidden}
.item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent}
.item.crit{border-color:#e14b4b55}.item.crit::before{background:var(--crit)}
.item.low{border-color:#e8a33d55}.item.low::before{background:var(--low)}
.item-main{flex:1;min-width:0;padding-left:4px}
.item-name{font-size:15px;font-weight:600;line-height:1.3;color:var(--paper)}
.item-meta{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--dim);
  margin-top:4px;letter-spacing:.01em}
.item-meta .num{color:var(--ember);font-weight:700}

/* Stepper: ticket punch control */
.stepper{display:flex;align-items:center;gap:0;background:var(--panel2);
  border-radius:9px;overflow:hidden;flex:0 0 auto;border:1px solid var(--line)}
.stepper button{width:38px;height:40px;font-size:19px;font-weight:600;color:var(--txt)}
.stepper button:active{background:var(--line)}
.stepper .qty{width:46px;height:40px;text-align:center;font-family:'Roboto Mono',monospace;
  font-size:16px;font-weight:700;background:transparent;color:var(--txt);border:none;
  border-left:1px solid var(--line);border-right:1px solid var(--line)}
.qty.has{color:var(--ember)}
.par-tag{font-family:'Roboto Mono',monospace;font-size:10.5px;font-weight:600;color:var(--dim);
  background:var(--panel2);padding:4px 9px;border-radius:6px;flex:0 0 auto;border:1px solid var(--line)}

/* ── Status stamps (the signature element): expo-ticket shorthand ── */
.stamp{display:inline-block;font-family:'Fjalla One',Inter,sans-serif;font-size:10px;
  letter-spacing:.09em;text-transform:uppercase;padding:3px 8px 2px;border-radius:3px;
  border:1.5px solid currentColor;transform:rotate(-2deg);}
.stamp.crit{color:var(--crit)} .stamp.low{color:var(--low)} .stamp.ok{color:var(--ok)}

/* ── Buttons ── */
.btn{display:block;width:100%;padding:15px;border-radius:11px;font-size:14.5px;
  font-weight:700;text-align:center;margin:8px 0;background:var(--ember);color:#1a0a03;
  letter-spacing:.01em;box-shadow:0 4px 16px -4px #ff6b3555;transition:transform .1s ease}
.btn.ghost{background:var(--panel);color:var(--txt);border:1px solid var(--line);box-shadow:none}
.btn.warn{background:var(--low);color:#1f1400}
.btn:active{transform:scale(.985)}
.btn-row{display:flex;gap:8px}
.btn-row .btn{margin:8px 0}

/* ── Bottom tab bar ── */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;
  background:rgba(24,23,27,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;
  padding-bottom:env(safe-area-inset-bottom,0)}
.tab{flex:1;padding:11px 4px 12px;text-align:center;color:var(--dim);font-size:10px;
  font-family:'Roboto Mono',monospace;letter-spacing:.04em;text-transform:uppercase;font-weight:600}
.tab.active{color:var(--ember)}
.tab .ico{font-size:19px;display:block;margin-bottom:4px;filter:grayscale(1);opacity:.7}
.tab.active .ico{filter:none;opacity:1}

/* ── Modals ── */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(6,5,6,.72);
  backdrop-filter:blur(2px);
  display:flex;align-items:flex-end;justify-content:center;padding:0}
.sheet{background:var(--panel);width:100%;max-width:520px;max-height:92vh;
  overflow-y:auto;border-radius:20px 20px 0 0;padding:22px 18px 30px;
  border:1px solid var(--line);box-shadow:var(--shadow-pop);position:relative}
.sheet h2{margin:0 0 4px;font-size:21px;color:var(--paper)}
.sheet .close{position:absolute;top:14px;right:16px;font-size:26px;color:var(--dim);
  width:32px;height:32px;display:flex;align-items:center;justify-content:center}

/* ── Inventory count grid ── */
.inv-head{display:grid;grid-template-columns:1fr 46px 46px 52px 52px;gap:6px;
  padding:9px 10px;font-family:'Roboto Mono',monospace;font-size:9.5px;color:var(--dim);
  font-weight:700;text-transform:uppercase;letter-spacing:.06em;position:sticky;top:64px;
  background:var(--ink);z-index:10}
.inv-row{display:grid;grid-template-columns:1fr 46px 46px 52px 52px;gap:6px;
  align-items:center;padding:11px 10px;background:var(--panel);border:1px solid var(--line);
  border-radius:9px;margin-bottom:6px;font-size:13px;box-shadow:var(--shadow-card)}
.inv-row.counted{border-color:#a78bd64d}
.inv-row .nm{font-size:13px;font-weight:600;line-height:1.25;min-width:0;color:var(--paper)}
.inv-cell{text-align:center;font-weight:600;font-family:'Roboto Mono',monospace}
.inv-cell.begin{color:var(--dim)}
.inv-cell.add{color:var(--ok)}
.inv-cell button{width:100%;padding:8px 2px;border-radius:7px;background:var(--panel2);
  color:var(--txt);font-weight:700;font-size:13px;border:1px solid var(--line)}
.inv-cell button.zero{background:var(--crit-dim);color:var(--crit);border-color:#e14b4b3d}
.inv-cell button.done{background:#a78bd61f;color:var(--purple);border-color:#a78bd63d}

/* ── Number pad ── */
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.pad button{padding:18px;font-family:'Roboto Mono',monospace;font-size:20px;font-weight:700;
  background:var(--panel2);border-radius:11px;border:1px solid var(--line)}
.pad button:active{background:var(--line)}
.pad-display{font-family:'Roboto Mono',monospace;font-size:32px;font-weight:700;text-align:center;
  padding:14px;background:var(--panel2);border-radius:11px;margin-bottom:4px;min-height:64px;
  border:1px solid var(--line)}

/* ── Area tally (count sheet) ── */
.area-block{background:var(--panel2);border:1px solid var(--line);border-radius:12px;
  padding:11px 12px;margin:8px 0}
.area-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.area-name{font-weight:600;font-size:14.5px;color:var(--paper)}
.area-sub{font-family:'Roboto Mono',monospace;font-size:15px;font-weight:700;color:var(--ember)}
.area-sub.unset{color:var(--dim);font-weight:600;font-size:12px;font-family:'Inter',sans-serif}
.entry{display:flex;align-items:center;gap:8px;background:var(--panel);border-radius:8px;
  padding:7px 10px;margin:4px 0;border:1px solid var(--line)}
.entry .n{flex:1;font-family:'Roboto Mono',monospace;font-size:14px;font-weight:700}
.entry .x{color:var(--crit);font-size:17px;padding:2px 8px}
.area-add{display:flex;gap:8px;margin-top:6px}
.area-add input{flex:1;padding:10px;background:var(--panel);border:1px solid var(--line);
  border-radius:8px;color:var(--txt);font-size:16px;text-align:center;font-family:'Roboto Mono',monospace}
.area-add button{padding:10px 16px;background:var(--ember);color:#1a0a03;border-radius:8px;
  font-weight:700;font-size:14px}
.area-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:8px}
.area-dot.on{background:var(--ok)} .area-dot.off{background:var(--dim);opacity:.4}

.sheet.count-sheet{padding-bottom:88px}
.save-bar{position:sticky;bottom:0;left:0;right:0;margin:12px -18px -30px;padding:14px 18px
  calc(14px + env(safe-area-inset-bottom,0));
  background:rgba(24,23,27,.96);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);z-index:5}
.save-bar .btn{margin:0}

/* ── History ── */
.hist-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:15px;margin-bottom:9px;box-shadow:var(--shadow-card)}
.hist-card .date{font-size:15px;font-weight:600;color:var(--paper)}
.hist-card .sup{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--dim);margin-top:3px}
.hist-card .cnt{float:right;font-family:'Roboto Mono',monospace;font-size:11px;color:var(--ember);font-weight:700}

/* ── Misc ── */
.empty{text-align:center;color:var(--dim);padding:56px 24px;font-size:14px;line-height:1.7}
.toast{position:fixed;bottom:104px;left:50%;transform:translateX(-50%);z-index:200;
  background:var(--panel2);border:1px solid var(--line);padding:12px 20px;
  border-radius:11px;font-size:13.5px;font-weight:600;max-width:90%;text-align:center;
  box-shadow:var(--shadow-pop)}
.toast.warn{border-color:var(--low);color:var(--low)}
.toast.ok{border-color:var(--ok);color:var(--ok)}
.pill-count{background:var(--ember-dim);color:var(--ember);font-family:'Roboto Mono',monospace;
  font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.field{width:100%;padding:12px;background:var(--panel2);border:1px solid var(--line);
  border-radius:9px;color:var(--txt);font-size:16px;margin:6px 0}
label.fl{font-size:11px;color:var(--dim);font-weight:700;display:block;margin-top:12px;
  text-transform:uppercase;letter-spacing:.05em;font-family:'Roboto Mono',monospace}

/* ── Focus visibility (a11y floor) ── */
button:focus-visible,input:focus-visible,textarea:focus-visible{
  outline:2px solid var(--ember);outline-offset:1px}

/* ── Reduced motion respected ── */
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;transition-duration:.001ms!important}
}
</style>

const SUP_NAMES = Object.keys(DEFAULT_SUPPLIERS);
/* ═══════════════════════════════════════════════════════════════════
   2. STATE + PERSISTENCE + SYNC
   Design: state = working copy. localStorage = cache. Firebase = truth.
   Every mutation: set state -> saveLocal(key) -> pushRemote(key).
   Echo guard stops the race conditions that crashed the old app.
   ═══════════════════════════════════════════════════════════════════ */

const LS_PREFIX = 'bartletts-v2-';

// The keys we persist + sync. Each is independent — no cross-key coupling.
const SYNC_KEYS = {
  catalog:   'catalog',    // per-supplier item list (par edits, custom items)
  deletedIds:'deletedIds', // tombstones: default items the user removed (per supplier)
  locations: 'locations',  // configurable storage locations for the tally
  orderQty:  'orderQty',   // {itemId: qty} current draft order
  onHand:    'onHand',     // {itemId: count} current on-hand entries
  trimark:   'trimark',    // {itemId:{begin,add,count,locs}} monthly inventory
  history:   'history',    // array of saved order/inventory records
  cog:       'cog',        // COGS: {sales:{}, manual:{}}
  learning:  'learning',   // recorded order patterns (data only; prediction optional)
};

function defaultState(){
  const catalog = {};
  for (const sn of SUP_NAMES){
    catalog[sn] = { ...DEFAULT_SUPPLIERS[sn],
      items: DEFAULT_SUPPLIERS[sn].items.map(i => ({...i})) };
  }
  return {
    tab:'order', activeSupp:'ABCO', editMode:false,
    catalog, deletedIds:{}, locations:['dock','closet','restaurant'],
    orderQty:{}, onHand:{}, trimark:{}, history:[],
    cog:{sales:{}, manual:{}}, learning:{},
  };
}

const state = defaultState();

/* ── localStorage helpers ── */
function lsGet(k){ try{ const v=localStorage.getItem(LS_PREFIX+k); return v?JSON.parse(v):null; }catch{ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(LS_PREFIX+k, JSON.stringify(v)); }catch{} }

/* ── Echo guard: after a local write, ignore remote echoes for this key ── */
const _echoUntil = {};                       // {key: timestamp}
function markLocalWrite(key){ _echoUntil[key] = Date.now() + 2000; }
function isEchoing(key){ return Date.now() < (_echoUntil[key]||0); }

/* ── Catalog merge: default is the schema, stored wins on editable fields.
      No inventoryOnly flag anywhere — items always render. ── */
function mergeCatalog(stored){
  if(!stored || typeof stored!=='object') return;
  const deleted = state.deletedIds || {};
  for(const sn of SUP_NAMES){
    const def = DEFAULT_SUPPLIERS[sn];
    const incoming = stored[sn]?.items;
    if(!Array.isArray(incoming)) continue;
    const tomb = new Set(deleted[sn]||[]);
    const byId = {};
    // Seed defaults (skip tombstoned) so itemNum/pack are present.
    for(const d of def.items){ if(!tomb.has(d.id)) byId[d.id] = {...d}; }
    // Overlay stored: stored wins on par/name/price; custom items (not in defaults) kept.
    for(const s of incoming){
      if(tomb.has(s.id)) continue;               // respect deletion
      const base = byId[s.id] || {};
      byId[s.id] = { ...base, ...s };
    }
    state.catalog[sn].items = Object.values(byId);
  }
}

/* ── Save one key locally + push to Firebase ── */
function persist(key){
  const val = state[key];
  lsSet(SYNC_KEYS[key], val);
  markLocalWrite(SYNC_KEYS[key]);
  pushRemote(SYNC_KEYS[key], val);
}

/* Firebase handle set later; no-op until connected. */
let fbDb = null;
function pushRemote(path, val){
  if(!fbDb) return;
  try{ fbDb.ref(path).set(val); }catch(e){ console.warn('push fail', path, e); }
}

/* ── Load everything from localStorage on boot ── */
function loadLocal(){
  const del = lsGet(SYNC_KEYS.deletedIds); if(del) state.deletedIds = del;
  const loc = lsGet(SYNC_KEYS.locations); if(Array.isArray(loc)&&loc.length) state.locations = loc;
  const cat = lsGet(SYNC_KEYS.catalog);   if(cat) mergeCatalog(cat);
  const oq  = lsGet(SYNC_KEYS.orderQty);  if(oq)  state.orderQty = oq;
  const oh  = lsGet(SYNC_KEYS.onHand);    if(oh)  state.onHand   = oh;
  const tm  = lsGet(SYNC_KEYS.trimark);   if(tm)  state.trimark  = tm;
  const h   = lsGet(SYNC_KEYS.history);   if(Array.isArray(h)) state.history = h;
  const cog = lsGet(SYNC_KEYS.cog);       if(cog) state.cog = {sales:{},manual:{},...cog};
  const lrn = lsGet(SYNC_KEYS.learning);  if(lrn) state.learning = lrn;
}

/* ═══════════════════════════════════════════════════════════════════
   MIGRATION  (read old v1 data → new v2 shape, non-destructive)
   Old app split TRIMARK into trimarkBegin/trimarkAdd/trimarkTally and
   stored history with a `suppliers` object. We map those into v2 shapes.
   Runs only if v2 has no data yet, so it never clobbers newer edits.
   ═══════════════════════════════════════════════════════════════════ */

function migrateFromV1(old){
  if(!old || typeof old!=='object') return false;
  let did = false;

  if(old.catalog){ mergeCatalog(old.catalog); did=true; }

  if(Array.isArray(old.history) && !state.history.length){
    const flat=[];
    for(const rec of old.history){
      if(rec.items && rec.supplier){ flat.push(rec); continue; }
      const supps = rec.suppliers||{};
      for(const sn of Object.keys(supps)){
        const items=(supps[sn]||[]).map(i=>({id:i.id,name:i.name,itemNum:i.itemNum||'',
          orderQty:+i.orderQty||0, unitCost:i.unitCost, count:i.count, used:i.used}));
        flat.push({date:rec.date, ts:new Date(rec.date).getTime()||Date.now(),
          supplier:sn, type:rec.type|| (sn==='TRIMARK'?'inventory':'order'), items});
      }
    }
    if(flat.length){ state.history=flat; did=true; }
  }

  if((old.trimarkBegin||old.trimarkAdd||old.trimarkTally) && !Object.keys(state.trimark).length){
    const b=old.trimarkBegin||{}, a=old.trimarkAdd||{}, tally=old.trimarkTally||{};
    const ids=new Set([...Object.keys(b),...Object.keys(a),...Object.keys(tally)]);
    for(const id of ids){
      const entry={};
      if(b[id]!=null) entry.begin=b[id];
      if(a[id]!=null) entry.add=a[id];
      const tv=tally[id];
      if(tv && typeof tv==='object'){
        entry.locs={dock:+tv.dock||0, closet:+tv.closet||0, restaurant:+tv.restaurant||0};
        entry.areas={};
        if(+tv.dock)       entry.areas.dock=[+tv.dock];
        if(+tv.closet)     entry.areas.closet=[+tv.closet];
        if(+tv.restaurant) entry.areas.restaurant=[+tv.restaurant];
        entry.count = (entry.locs.dock+entry.locs.closet+entry.locs.restaurant)||'';
      }
      state.trimark[id]=entry;
    }
    did=true;
  }

  if((old.cogSales||old.cogManual) && !Object.keys(state.cog.sales).length && !Object.keys(state.cog.manual).length){
    state.cog = { sales: old.cogSales||{}, manual: old.cogManual||{} };
    did=true;
  }

  if(old.learning && !Object.keys(state.learning).length){ state.learning=old.learning; did=true; }

  return did;
}

/* ═══════════════════════════════════════════════════════════════════
   3. PURE MATH  (no DOM, no state — fully testable)
   ═══════════════════════════════════════════════════════════════════ */

// Order need for a normal supplier: how many packs to reach par.
function orderNeed(par, onHand){
  const p = parseFloat(par), h = parseFloat(onHand);
  if(isNaN(p)) return 0;
  if(onHand==='' || onHand==null || isNaN(h)) return 0;   // uncounted -> suggest nothing
  return Math.max(0, p - h);
}

// Stock status for row colouring.
function stockStatus(onHand, par){
  const h=parseFloat(onHand), p=parseFloat(par);
  if(onHand==='' || onHand==null || isNaN(h)) return null;
  if(h<=0) return 'crit';
  if(!isNaN(p) && h<p) return 'low';
  return 'ok';
}

// TRIMARK inventory math. START = BEGIN + ADD. USED = START - COUNT.
// ORDER = max(0, PAR - COUNT).  (COUNT is the true end-of-month on-hand.)
function trimarkRow(begin, add, count, par, unitCost){
  const b=+begin||0, a=+add||0;
  const start = b + a;
  const counted = (count===''||count==null||isNaN(+count)) ? null : +count;
  const used  = counted==null ? null : start - counted;
  const order = counted==null ? null : Math.max(0, (+par||0) - counted);
  // Breakage $ = the Start→Count gap valued at unit cost. A negative gap
  // (counted MORE than start — likely a miscount or unlogged delivery)
  // is not a dollar loss, so it floors at 0 rather than showing a "gain".
  const cost = (+unitCost)||0;
  const breakageQty = used==null ? null : Math.max(0, used);
  const breakageValue = (used==null || !cost) ? null : +(breakageQty*cost).toFixed(2);
  return { start, used, order, counted, breakageQty, breakageValue };
}

// Month key from a date-ish value: 'YYYY-MM'.
function monthKey(dateVal){
  const d = (dateVal instanceof Date) ? dateVal : new Date(dateVal);
  if(isNaN(d)) return null;
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

// COGS spend DERIVED FROM SAVED ORDERS for a given month.
// Sums orderQty × unitCost across every history record dated in that month.
// unitCost comes from the saved line, else the current catalog item.
function cogSpendFromOrders(history, catalog, mk){
  const spend = {}; for(const sn of SUP_NAMES) spend[sn]=0;
  let total = 0;
  for(const rec of (history||[])){
    if(monthKey(rec.ts||rec.date) !== mk) continue;
    const sn = rec.supplier;
    for(const it of (rec.items||[])){
      const qty = +it.orderQty||0; if(qty<=0) continue;
      let cost = it.unitCost;
      if(cost==null && catalog && catalog[sn]){
        const ci = catalog[sn].items.find(c=>c.id===it.id || c.name===it.name);
        cost = ci ? ci.unitCost : null;
      }
      cost = +cost||0;
      if(cost>0){ const line = qty*cost; spend[sn]=(spend[sn]||0)+line; total+=line; }
    }
  }
  return { bySupplier:spend, total };
}

// Record a saved order into the learning store (data only — no prediction here).
function recordLearning(learning, rec){
  const out = {...(learning||{})};
  const wom = (()=>{ const d=new Date(rec.ts||rec.date); return isNaN(d)?0:Math.floor((d.getDate()-1)/7); })();
  const dow = (()=>{ const d=new Date(rec.ts||rec.date); return isNaN(d)?0:d.getDay(); })();
  for(const it of (rec.items||[])){
    const qty=+it.orderQty||0; if(qty<=0) continue;
    const k = rec.supplier+'|'+it.name;
    if(!out[k]) out[k]={supplier:rec.supplier, name:it.name, orders:[]};
    out[k].orders.push({ qty, dow, wom, ts: rec.ts||Date.now() });
    if(out[k].orders.length>60) out[k].orders = out[k].orders.slice(-60); // cap growth
  }
  return out;
}

// Export for Node testing
/* ═══════════════════════════════════════════════════════════════════
   MULTI-LOCATION TALLY
   The same item can be stored in several places (dock, closet, restaurant…).
   You count each location; the tally sums them into the item's Count.
   Locations are configurable (state.locations), default dock/closet/restaurant.
   Per-item location counts live in state.trimark[id].locs = {locName: n}.
   ═══════════════════════════════════════════════════════════════════ */

const DEFAULT_LOCATIONS = ['dock','closet','restaurant'];

function getLocations(){
  const l = state.locations;
  return (Array.isArray(l) && l.length) ? l : DEFAULT_LOCATIONS;
}

// ── Area-based tally ──────────────────────────────────────────────
// An item's count is organized by area; each area holds a list of entries.
// shape: areas = { dock:[22], restaurant:[30,24], closet:[] }
// Subtotal per area = sum of its entries. Total = sum of all entries.
// An area with zero entries is "not counted yet"; an area with entries
// (including a single 0) is counted.

function areaSubtotal(entries){
  if(!Array.isArray(entries) || !entries.length) return null;
  return entries.reduce((s,v)=> s + (+v||0), 0);
}

function areasTotal(areas){
  if(!areas || typeof areas!=='object') return null;
  let any=false, sum=0;
  for(const k of Object.keys(areas)){
    const st = areaSubtotal(areas[k]);
    if(st!=null){ any=true; sum+=st; }
  }
  return any ? sum : null;
}

// Which configured areas have no entries yet (the "did you forget?" list).
function uncountedAreas(locOrder, areas){
  const out=[];
  for(const loc of locOrder){
    const st = areaSubtotal(areas && areas[loc]);
    if(st==null) out.push(loc);
  }
  return out;
}

function analyzeAreas(locOrder, areas){
  const counted=[], blank=[];
  for(const loc of locOrder){
    (areaSubtotal(areas && areas[loc])==null ? blank : counted).push(loc);
  }
  return { counted, blank, total: areasTotal(areas),
    allBlank: counted.length===0, anyBlank: blank.length>0 };
}

// Back-compat: derive a flat {loc:subtotal} for anything still reading .locs
function areasToLocs(areas){
  const out={};
  if(areas) for(const k of Object.keys(areas)){
    const st=areaSubtotal(areas[k]); out[k]= st==null?'':st;
  }
  return out;
}
/* ═══════════════════════════════════════════════════════════════════
   REPORTS  — date-range lookback across History, with noise-cutting filters.
   Pure aggregation: given history + a filter spec, produce a per-item
   summary (not a raw dump of every record) so past holidays are readable.
   ═══════════════════════════════════════════════════════════════════ */

// Default filter spec.
function defaultReportFilter(){
  const now = new Date();
  const start = new Date(now); start.setDate(start.getDate()-7);
  return {
    start: isoDate(start), end: isoDate(now),
    suppliers: 'all',        // 'all' or array of supplier names
    types: 'all',            // 'all' | 'order' | 'inventory'
    activeOnly: true,        // hide items with zero quantity across the range
    search: '',              // item-name substring filter
  };
}
function isoDate(d){ return d.toISOString().slice(0,10); }

// Quick-range presets, computed relative to "now".
function reportPreset(key, now){
  now = now || new Date();
  const d = (n)=>{ const x=new Date(now); x.setDate(x.getDate()+n); return x; };
  const startOfWeekLastYear = (weeksAgoYears)=>{
    const x=new Date(now); x.setFullYear(x.getFullYear()-1); return x;
  };
  switch(key){
    case '7d':  return { start: isoDate(d(-7)),  end: isoDate(now) };
    case '30d': return { start: isoDate(d(-30)), end: isoDate(now) };
    case 'month': {
      const s=new Date(now.getFullYear(), now.getMonth(), 1);
      return { start: isoDate(s), end: isoDate(now) };
    }
    case 'lastyear-week': {
      // Same week, one year ago: 3 days before/after today's date last year.
      const ly = new Date(now); ly.setFullYear(ly.getFullYear()-1);
      const s = new Date(ly); s.setDate(s.getDate()-3);
      const e = new Date(ly); e.setDate(e.getDate()+3);
      return { start: isoDate(s), end: isoDate(e) };
    }
    case 'lastyear-month': {
      const ly = new Date(now); ly.setFullYear(ly.getFullYear()-1);
      const s = new Date(ly.getFullYear(), ly.getMonth(), 1);
      const e = new Date(ly.getFullYear(), ly.getMonth()+1, 0);
      return { start: isoDate(s), end: isoDate(e) };
    }
    default: return defaultReportFilter();
  }
}

// Is a history record's date within [start,end] (inclusive, by day)?
function inRange(rec, start, end){
  const t = rec.ts || Date.parse(rec.date);
  if(!t || isNaN(t)) return false;
  const day = new Date(t); day.setHours(12,0,0,0); // normalize to avoid TZ edge issues
  const s = new Date(start+'T00:00:00');
  const e = new Date(end+'T23:59:59');
  return day >= s && day <= e;
}

// Build the per-item report for a filter spec.
// Returns { rows:[{name,supplier,type,totalQty,occurrences,unitCost,totalCost}], recordCount }
function buildReport(history, filter){
  const f = {...defaultReportFilter(), ...filter};
  const supSet = f.suppliers==='all' ? null : new Set(f.suppliers);
  const search = (f.search||'').trim().toLowerCase();

  const matched = (history||[]).filter(rec=>{
    if(!inRange(rec, f.start, f.end)) return false;
    if(supSet && !supSet.has(rec.supplier)) return false;
    if(f.types!=='all' && rec.type!==f.types) return false;
    return true;
  });

  // Aggregate by supplier+name+type so an order and an inventory count
  // for the same item don't get merged into one confusing row.
  const byKey = {};
  for(const rec of matched){
    for(const it of (rec.items||[])){
      const qty = +it.orderQty||0;
      if(f.activeOnly && qty<=0 && it.count==null) continue;   // skip true zero-activity lines
      if(search && !it.name.toLowerCase().includes(search)) continue;
      const key = rec.supplier+'|'+it.name+'|'+rec.type;
      if(!byKey[key]) byKey[key] = {
        name: it.name, supplier: rec.supplier, type: rec.type,
        totalQty: 0, occurrences: 0, unitCost: it.unitCost,
        firstDate: rec.date, lastDate: rec.date,
        breakageQty: 0, breakageValue: 0, breakageValueKnown: false,
      };
      const row = byKey[key];
      row.totalQty += qty;
      row.occurrences += 1;
      row.lastDate = rec.date;
      if(row.unitCost==null && it.unitCost!=null) row.unitCost = it.unitCost;
      if(it.breakageQty){
        row.breakageQty += it.breakageQty;
        if(it.breakageValue!=null){ row.breakageValue += it.breakageValue; row.breakageValueKnown=true; }
      }
    }
  }
  const rows = Object.values(byKey).map(r=>({
    ...r,
    totalCost: (r.unitCost!=null) ? +(r.totalQty*r.unitCost).toFixed(2) : null,
    breakageValue: r.breakageValueKnown ? +r.breakageValue.toFixed(2) : null,
  })).sort((a,b)=> b.totalQty - a.totalQty);

  const breakageTotal = +rows.reduce((s,r)=> s+(r.breakageValue||0), 0).toFixed(2);
  const breakageKnownCount = rows.filter(r=>r.breakageQty>0 && r.breakageValue!=null).length;
  const breakageUnpricedCount = rows.filter(r=>r.breakageQty>0 && r.breakageValue==null).length;

  return { rows, recordCount: matched.length, filter: f,
    breakageTotal, breakageKnownCount, breakageUnpricedCount };
}

// Compare current-range totals against the same range one year earlier.
function buildYoyComparison(history, filter){
  const cur = buildReport(history, filter);
  const s1 = new Date(filter.start+'T00:00:00'); s1.setFullYear(s1.getFullYear()-1);
  const e1 = new Date(filter.end+'T00:00:00');   e1.setFullYear(e1.getFullYear()-1);
  const prior = buildReport(history, {...filter, start:isoDate(s1), end:isoDate(e1)});
  const priorByKey={};
  for(const r of prior.rows) priorByKey[r.supplier+'|'+r.name+'|'+r.type]=r.totalQty;
  const rows = cur.rows.map(r=>{
    const key=r.supplier+'|'+r.name+'|'+r.type;
    const priorQty = priorByKey[key];
    return { ...r, priorQty: priorQty==null?null:priorQty,
      delta: priorQty==null?null:(r.totalQty-priorQty) };
  });
  return { rows, recordCount: cur.recordCount, priorRecordCount: prior.recordCount,
    priorRange:{start:isoDate(s1),end:isoDate(e1)}, filter };
}

if(typeof module!=='undefined'){
  module.exports={defaultReportFilter,reportPreset,inRange,buildReport,buildYoyComparison,isoDate};
}

  const sales = state.cog.sales[mk]||'';

  const derived = cogSpendFromOrders(state.history, state.catalog, mk);
  const orderSpend = derived.total;
  const totalSpend = orderSpend + (+manual||0);
  const pct = (sales>0) ? ((totalSpend/+sales)*100).toFixed(1)+'%' : '—';

  const bySupp = SUP_NAMES.map(sn=>{
    const v = derived.bySupplier[sn]||0;
    if(v<=0) return '';
    return `<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px">
      <span>${sn}</span><span style="font-weight:700">$${v.toFixed(2)}</span></div>`;
  }).filter(Boolean).join('');

  return `<div class="sched">Cost of goods is calculated from the orders you actually saved
    this month (order qty × unit price). Set unit prices in ✎ Edit items, or upload a price list.</div>
    <div class="hist-card">
      <label class="fl">Month</label><div style="font-weight:700;font-size:16px">${mk}</div>

      <label class="fl">Spend from saved orders</label>
      <div style="font-size:24px;font-weight:800">$${orderSpend.toFixed(2)}</div>
      ${bySupp?`<div style="margin-top:8px;border-top:1px solid var(--line);padding-top:8px">${bySupp}</div>`
        :'<div class="sched" style="padding:8px 0">No priced orders saved yet this month.</div>'}

      <label class="fl">Other spend (manual, optional)</label>
      <input class="field" inputmode="decimal" value="${esc(manual)}" placeholder="0"
        onchange="setCog('manual','${mk}',this.value)">

      <label class="fl">Sales this month ($)</label>
      <input class="field" inputmode="decimal" value="${esc(sales)}" placeholder="0"
        onchange="setCog('sales','${mk}',this.value)">

      <label class="fl">Total cost of goods</label>
      <div style="font-size:15px;color:var(--dim)">$${totalSpend.toFixed(2)} spend ÷ sales</div>
      ${sales>0
        ? `<div style="font-size:32px;font-weight:800;color:var(--ember);font-family:'Roboto Mono',monospace">${pct}</div>`
        : `<div style="font-size:14px;color:var(--dim);padding:8px 0">Enter sales above to calculate</div>`}
    </div>
    <button class="btn ghost" onclick="uploadPriceList()">📄 Upload price list (CSV)</button>`;
}

let _repFilter = null;   // lazily initialized from defaultReportFilter()
let _repMode = 'list';   // 'list' | 'yoy'
let _repBreakageExpanded = false;
function toggleReportBreakageExpanded(){ _repBreakageExpanded = !_repBreakageExpanded; render(); }

function reportView(){
  if(!_repFilter){
    _repFilter = lsGet('reportFilter-local') || defaultReportFilter();
  }
  const f = _repFilter;
  const data = _repMode==='yoy'
    ? buildYoyComparison(state.history, f)
    : buildReport(state.history, f);

  const presetBtns = [
    ['7d','Last 7 days'],['30d','Last 30 days'],['month','This month'],
    ['lastyear-week','Same week, last yr'],['lastyear-month','Same month, last yr']

  const supChips = ['all',...SUP_NAMES].map(sn=>{

    `<button class="sup-pill${f.types===k?' active':''}" style="${f.types===k?'background:var(--accent);color:#04121f':''}"
      onclick="setReportType('${k}')">${lbl}</button>`).join('');

  const rows = data.rows;
  const grandQty = rows.reduce((s,r)=>s+r.totalQty,0);
  const grandCost = rows.reduce((s,r)=> s+(r.totalCost||0), 0);

  // ── Breakage summary (only meaningful when Inventory records are in view) ──
  const showBreakage = f.types!=='order' && (data.breakageTotal>0 || data.breakageUnpricedCount>0 || data.breakageKnownCount>0);
  const breakRows = rows.filter(r=>r.breakageQty>0).sort((a,b)=> (b.breakageValue||0)-(a.breakageValue||0));
  const _repShowAllBreakage = !!_repBreakageExpanded;
  const visibleBreakRows = _repShowAllBreakage ? breakRows : breakRows.filter(r=>r.breakageValue>0).slice(0,8);
  const hiddenBreakCount = breakRows.length - visibleBreakRows.length;

  const breakageSection = !showBreakage ? '' : `
    <div style="margin-top:16px">
      <label class="fl">Breakage this range <span style="color:var(--dim);font-weight:400">(Start − Count, valued at unit cost)</span></label>
      <div style="display:flex;gap:8px;margin:8px 0">

          <div style="font-size:22px;font-weight:800;color:var(--crit)">$${data.breakageTotal.toFixed(2)}</div>
          <div style="font-size:11px;color:var(--dim)">TOTAL BREAKAGE</div>
        </div>
        <div class="hist-card" style="flex:1;text-align:center;padding:14px 8px">
          <div style="font-size:22px;font-weight:800">${data.breakageKnownCount}</div>
          <div style="font-size:11px;color:var(--dim)">ITEMS PRICED</div>
        </div>
        ${data.breakageUnpricedCount>0?`<div class="hist-card" style="flex:1;text-align:center;padding:14px 8px;border-color:var(--low)">
          <div style="font-size:22px;font-weight:800;color:var(--low)">${data.breakageUnpricedCount}</div>
          <div style="font-size:11px;color:var(--dim)">UNPRICED</div>
        </div>`:''}
      </div>
      ${data.breakageUnpricedCount>0?`<div class="sched" style="color:var(--low)">
        ${data.breakageUnpricedCount} item${data.breakageUnpricedCount!==1?'s':''} had shortages but no price set,
        so they're not counted in the total above. Set a price in ✎ Edit items to include them.</div>`:''}
      ${breakRows.length ? visibleBreakRows.map(r=>`
        <div class="item">
          <div class="item-main">
            <div class="item-name">${esc(r.name)}</div>
            <div class="item-meta">${esc(r.supplier)} · ${r.breakageQty} short</div>
          </div>
          <div style="font-size:18px;font-weight:800;color:${r.breakageValue?'var(--crit)':'var(--dim)'}">

        </div>`).join('')

      ${hiddenBreakCount>0
        ? `<button class="btn ghost" onclick="toggleReportBreakageExpanded()">Show ${hiddenBreakCount} more (smaller or unpriced) →</button>`
        : (_repShowAllBreakage && breakRows.length>8)
          ? `<button class="btn ghost" onclick="toggleReportBreakageExpanded()">Show top items only</button>`
          : ''}
    </div>`;

  const rowsHtml = rows.length ? rows.map(r=>{
    const deltaHtml = (_repMode==='yoy')
      ? (r.priorQty==null

    return `<div class="item">

      <div style="font-size:20px;font-weight:800;color:var(--accent)">${r.totalQty}</div>

  }).join('') : `<div class="empty">
    <div style="font-size:34px;margin-bottom:10px;opacity:.5">📊</div>
    <div style="color:var(--paper);font-weight:600;font-size:15px;margin-bottom:6px">No activity in this range</div>
    <div>Try a wider date range or clear a filter above.</div>

  return `
    <div class="sched"><b>Look back at what you ordered or counted.</b> Pick a range, narrow with filters, and export if needed.</div>

    <label class="fl">Quick ranges</label>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin:6px 0">${presetBtns}</div>

    <label class="fl">From</label>
    <input class="field" type="date" value="${f.start}" onchange="setReportDate('start',this.value)">
    <label class="fl">To</label>

    <label class="fl">Supplier</label>
    <div class="supbar" style="padding:6px 0">${supChips}</div>

    <label class="fl">Type</label>

    <label class="fl">Search item name</label>
    <input class="field" value="${esc(f.search)}" placeholder="e.g. turkey, foil…" oninput="setReportSearch(this.value)">

      <label style="display:flex;align-items:center;gap:8px;font-size:14px">
        <input type="checkbox" ${f.activeOnly?'checked':''} onchange="toggleReportActiveOnly()">

      </label>
    </div>

    <div class="btn-row">
      <button class="btn${_repMode==='list'?'':' ghost'}" onclick="setReportMode('list')">List</button>
      <button class="btn${_repMode==='yoy'?'':' ghost'}" onclick="setReportMode('yoy')">Vs. last year</button>
    </div>

    <div class="sched" style="display:flex;justify-content:space-between;margin-top:12px">
      <span><b>${rows.length}</b> item${rows.length!==1?'s':''} · <b>${data.recordCount}</b> record${data.recordCount!==1?'s':''}</span>
      <span><b>${grandQty}</b> total qty${grandCost>0?` · $${grandCost.toFixed(2)}`:''}</span>
    </div>
    ${_repMode==='yoy' ? `<div class="sched">Comparing to ${esc(data.priorRange.start)} – ${esc(data.priorRange.end)} (${data.priorRecordCount} records)</div>`:''}
    ${breakageSection}

    <label class="fl" style="margin-top:16px">All activity in this range</label>
    ${rowsHtml}

    <div class="btn-row" style="margin-top:14px">
      <button class="btn ghost" onclick="exportReportCsv()">📄 Export CSV</button>
      <button class="btn ghost" onclick="exportReportPdf()">🖨 Print / Save PDF</button>
    </div>`;
}

function _reRenderReport(){ lsSet('reportFilter-local', _repFilter); render(); }
function setReportDate(which,val){ _repFilter[which]=val; _reRenderReport(); }
function setReportType(t){ _repFilter.types=t; _reRenderReport(); }
function setReportSearch(v){ _repFilter.search=v; _reRenderReport(); }
function toggleReportActiveOnly(){ _repFilter.activeOnly=!_repFilter.activeOnly; _reRenderReport(); }
function setReportMode(m){ _repMode=m; render(); }
function toggleReportSupplier(sn){
  if(sn==='all'){ _repFilter.suppliers='all'; _reRenderReport(); return; }
  let cur = Array.isArray(_repFilter.suppliers) ? _repFilter.suppliers.slice() : [];
  if(cur.includes(sn)) cur=cur.filter(x=>x!==sn); else cur=[...cur,sn];
  _repFilter.suppliers = cur.length ? cur : 'all';
  _reRenderReport();
}
function applyReportPreset(key){
  const p = reportPreset(key);
  _repFilter.start=p.start; _repFilter.end=p.end;
  _reRenderReport();
}

/* ── Export: CSV ── */
function exportReportCsv(){
  const data = _repMode==='yoy' ? buildYoyComparison(state.history,_repFilter) : buildReport(state.history,_repFilter);
  if(!data.rows.length){ toast('Nothing to export','warn'); return; }
  const header = _repMode==='yoy'
    ? ['Item','Supplier','Type','Qty this range','Occurrences','Unit cost','Total cost','Breakage qty','Breakage $','Qty same range last year','Change']
    : ['Item','Supplier','Type','Total qty','Occurrences','Unit cost','Total cost','Breakage qty','Breakage $','First date','Last date'];
  const rows = data.rows.map(r=> _repMode==='yoy'
    ? [r.name,r.supplier,r.type,r.totalQty,r.occurrences,r.unitCost??'',r.totalCost??'',r.breakageQty||'',r.breakageValue??'',r.priorQty??'',r.delta??'']
    : [r.name,r.supplier,r.type,r.totalQty,r.occurrences,r.unitCost??'',r.totalCost??'',r.breakageQty||'',r.breakageValue??'',r.firstDate,r.lastDate]);
  const csv = [header, ...rows].map(row=>row.map(v=>{
    const s=String(v); return /[,"\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download = `Bartletts-report-${_repFilter.start}_to_${_repFilter.end}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('CSV downloaded','ok');
}

/* ── Export: print-ready view (use browser Print > Save as PDF) ── */

  const win = window.open('', '_blank');
  if(!win){
    toast('Pop-up blocked — check Settings > Safari > Block Pop-ups is off for this site, then try again','warn');

  win.document.write('<!DOCTYPE html><html><head><title>Bartlett\'s Report</title></head>'+

    win.document.open();

      (r.breakageValue!=null?'$'+r.breakageValue.toFixed(2):r.breakageQty+' (no price)') : ''}</td>
    ${_repMode==='yoy'?`<td style="text-align:right">${r.priorQty==null?'—':r.priorQty}</td>
      <td style="text-align:right">${r.delta==null?'—':(r.delta>0?'+':'')+r.delta}</td>`:''}
  </tr>`).join('');
  const breakageSummaryHtml = (data.breakageTotal>0 || data.breakageUnpricedCount>0) ? `
    <div style="display:flex;gap:12px;margin:14px 0">
      <div style="flex:1;border:1px solid #e5b5b0;background:#fdf1f0;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:800;color:#c0392b">$${data.breakageTotal.toFixed(2)}</div>
        <div style="font-size:10px;color:#888">TOTAL BREAKAGE</div>
      </div>
      <div style="flex:1;border:1px solid #ddd;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:800">${data.breakageKnownCount}</div>
        <div style="font-size:10px;color:#888">ITEMS PRICED</div>
      </div>
      ${data.breakageUnpricedCount>0?`<div style="flex:1;border:1px solid #f0d488;background:#fdf9ec;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:800;color:#b8860b">${data.breakageUnpricedCount}</div>
        <div style="font-size:10px;color:#888">UNPRICED</div>
      </div>`:''}
    </div>` : '';
  win.document.open();
  win.document.write(`<!DOCTYPE html><html><head><title>Bartlett's Report</title>
    <style>body{font-family:-apple-system,sans-serif;padding:24px;color:#111}

    <h1>Bartlett's — Order &amp; Inventory Report</h1>
    <div class="sub">${esc(_repFilter.start)} to ${esc(_repFilter.end)} · ${data.rows.length} items · ${data.recordCount} records</div>
    <button class="no-print" onclick="window.print()" style="margin-bottom:14px;padding:8px 16px;font-size:14px">🖨 Print / Save as PDF</button>
    ${breakageSummaryHtml}
    <table><thead><tr><th>Item</th><th>Supplier</th><th>Type</th><th>Qty</th><th>Cost</th><th>Breakage</th>
      ${_repMode==='yoy'?'<th>Last yr</th><th>Change</th>':''}</tr></thead>

/* ═══════════════════════════════════════════════════════════════════
   ORDER CHANNEL ROUTING (Trimark counted, but ordered elsewhere)
   Each item may carry orderChannel: 'text' | 'bek' | 'email'.
   Counting is unified in Trimark; ordering is routed here.
   ═══════════════════════════════════════════════════════════════════ */

// Build the list of Trimark items that need ordering, grouped by channel.
function trimarkOrderGroups(){
  const groups = { james:[], text:{}, bek:[], email:{} };
  for(const it of state.catalog['TRIMARK'].items){
    const t = state.trimark[it.id]||{};
    const r = trimarkRow(t.begin, t.add, t.count, it.par, it.unitCost);
    const ch = it.orderChannel;

    if(ch==='text'){
      // Manual reorder (firewood): NOT par-driven. Always available to send,
      // but flagged manual so the UI doesn't imply it's "due".
      const key = it.textNumber||'';
      (groups.text[key] = groups.text[key]||[]).push({
        name:it.name, orderQty: it.fixedQty||0, label:it.textLabel||it.name, manual:true
      });
    } else if(ch==='bek'){
      if(r.order>0) groups.bek.push({name:it.name, itemNum:it.itemNum||'', orderQty:r.order});
    } else if(ch==='email'){
      if(r.order>0){
        const key = it.altEmail||'';
        (groups.email[key] = groups.email[key]||[]).push({
          name:it.name, orderQty:r.order, vendor:it.altVendor||''
        });
      }
    } else {
      // Default Trimark → James
      if(r.order>0) groups.james.push({name:it.name, itemNum:it.itemNum||'', orderQty:r.order});
    }
  }
  return groups;
}

// Count how many distinct order actions the current inventory implies.
function trimarkChannelSummary(){
  const g = trimarkOrderGroups();
  const out = [];
  if(g.james.length) out.push({key:'james', label:`Email James`, n:g.james.length});
  Object.entries(g.text).forEach(([num,items])=>{
    const n = items.length; // firewood etc. — manual reorder, not par-driven
    out.push({key:'text:'+num, label:`Text order: ${items.map(i=>i.label).join(', ')} (manual)`,
      n, num, items, manual:true});
  });
  if(g.bek.length) out.push({key:'bek', label:`Add to BEK CSV`, n:g.bek.length, items:g.bek});
  Object.entries(g.email).forEach(([email,items])=>{
    const vendor = items[0]?.vendor || 'other vendor';
    out.push({key:'email:'+email, label:`Email ${vendor}`, n:items.length, email, items});
  });
  return out;
}

// Fire a specific channel.
function sendTrimarkChannel(key){
  const g = trimarkOrderGroups();
  if(key==='james'){
    if(!g.james.length){ toast('Nothing to order from James','warn'); return; }
    return sendEmail('TRIMARK', g.james);
  }
  if(key==='bek'){
    if(!g.bek.length){ toast('No BEK-routed items to order','warn'); return; }
    downloadBekCsv(g.bek);
    toast('Fryer oil added to BEK CSV','ok');
    return;
  }
  if(key.startsWith('text:')){
    const num = key.slice(5);
    const items = g.text[num]||[];
    if(!items.length){ toast('No text items','warn'); return; }
    if(!num){ editChannelTarget('text'); return; }   // no number set → prompt to add it
    const body = items.map(i=>`${i.label}: ${i.orderQty}`).join('\n');
    window.location.href = `sms:${num}&body=${encodeURIComponent('Bartlett\'s order:\n\n'+body+'\n\nThanks')}`;
    return;
  }
  if(key.startsWith('email:')){
    const email = key.slice(6);
    const g2 = trimarkOrderGroups().email;
    const items = g2[email]||[];
    if(!items.length){ toast('No items for this vendor','warn'); return; }
    if(!email){ editChannelTarget('email'); return; }  // no email set → prompt
    const vendor = items[0]?.vendor||'';
    const subject = `Bartlett's order — ${new Date().toLocaleDateString()}`;
    const body = `Hello${vendor?' '+vendor:''},\n\nPlease process the following order for Bartlett's:\n\n`+
      items.map(i=>`${i.orderQty} × ${i.name}`).join('\n')+`\n\nThank you,\nBartlett's Restaurant`;
    window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    return;
  }
}

// Let the user fill in the missing text number / vendor email (persists in catalog).
function editChannelTarget(kind){
  if(kind==='text'){
    const it = state.catalog['TRIMARK'].items.find(i=>i.orderChannel==='text');
    modal(`<h2>Firewood text number</h2>
      <div class="sched">Firewood is ordered by text, ${it.fixedQty} per delivery.
        Enter the phone number to text.</div>
      <label class="fl">Phone number (digits only)</label>
      <input class="field" id="ch-num" inputmode="tel" value="${esc(it.textNumber||'')}" placeholder="5125551234">
      <button class="btn" onclick="saveChannelTarget('text')">Save number</button>`);
  } else {
    const it = state.catalog['TRIMARK'].items.find(i=>i.orderChannel==='email');
    modal(`<h2>Uniform vendor email</h2>
      <div class="sched">Chef Hats &amp; Waiter Aprons are ordered by email to a separate company.</div>
      <label class="fl">Company name</label>
      <input class="field" id="ch-vendor" value="${esc(it.altVendor||'')}" placeholder="Uniform Co">
      <label class="fl">Email address</label>
      <input class="field" id="ch-email" inputmode="email" value="${esc(it.altEmail||'')}" placeholder="orders@uniformco.com">
      <button class="btn" onclick="saveChannelTarget('email')">Save vendor</button>`);
  }
}
function saveChannelTarget(kind){
  if(kind==='text'){
    const num = ($('ch-num').value||'').replace(/[^0-9]/g,'');
    for(const it of state.catalog['TRIMARK'].items) if(it.orderChannel==='text') it.textNumber=num;
  } else {
    const email=($('ch-email').value||'').trim(), vendor=($('ch-vendor').value||'').trim();
    for(const it of state.catalog['TRIMARK'].items) if(it.orderChannel==='email'){ it.altEmail=email; it.altVendor=vendor; }
  }
  persist('catalog'); closeModal(); render(); toast('Saved','ok');
}

function isDefaultItem(sn, id){

// Open the edit sheet for one item.
function editItem(sn, id){

function saveItem(sn, id){
  const it = state.catalog[sn].items.find(i=>i.id===id);
  if(!it) return;
  const name=($('e-name').value||'').trim();
  if(!name){ toast('Name can\'t be empty','warn'); return; }
  it.name = name;
  it.pack = ($('e-pack').value||'').trim();
  const par=$('e-par').value;   it.par = par===''?null:(+par||0);
  const cost=$('e-cost').value; it.unitCost = cost===''?null:(+cost||0);
  const numEl=$('e-num'); if(numEl) it.itemNum = (numEl.value||'').trim();
  persist('catalog'); closeModal(); render(); toast('Item updated','ok');
}

function deleteItem(sn, id){
  const it = state.catalog[sn].items.find(i=>i.id===id);
  confirmModal(`Delete "${it?it.name:id}"?\nThis removes it from ordering and inventory.`, ()=>{
    state.catalog[sn].items = state.catalog[sn].items.filter(i=>i.id!==id);
    if(isDefaultItem(sn, id)){
      state.deletedIds[sn] = state.deletedIds[sn]||[];
      if(!state.deletedIds[sn].includes(id)) state.deletedIds[sn].push(id);
      persist('deletedIds');
    }
    delete state.orderQty[id]; delete state.onHand[id]; delete state.trimark[id];
    persist('catalog'); persist('orderQty'); persist('trimark');
    closeModal(); render(); toast('Item deleted','ok');
  }, 'Delete item');
}

function confirmAddItem(sn){

/* ── Price list upload: CSV of "itemNum,unitCost" updates catalog prices ── */
function uploadPriceList(){
  modal(`<h2>Upload price list</h2>
    <div class="sched">CSV format: <b>item number, price</b> (one per line).
      Matching items across all suppliers get their unit price updated.</div>
    <label class="fl">Paste CSV or choose a file</label>
    <textarea class="field" id="price-csv" rows="6" placeholder="779178,42.50&#10;118599,12.00"></textarea>
    <input type="file" id="price-file" accept=".csv,text/csv" class="field" onchange="_readPriceFile(event)">
    <button class="btn" onclick="applyPriceList()">Apply prices</button>`);
}
function _readPriceFile(ev){
  const f=ev.target.files&&ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ const el=$('price-csv'); if(el) el.value=r.result; };
  r.readAsText(f);
}
function applyPriceList(){
  const text=($('price-csv')?.value||'').trim();
  if(!text){ toast('Nothing to apply','warn'); return; }
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  let updated=0, skipped=0;
  for(let i=0;i<lines.length;i++){
    const parts=lines[i].split(',').map(s=>s.trim().replace(/"/g,''));
    if(parts.length<2){ skipped++; continue; }
    const num=parts[0], cost=parseFloat(parts[1]);
    if(i===0 && isNaN(parseFloat(parts[0])) ) continue; // header row
    if(!num || isNaN(cost) || cost<0){ skipped++; continue; }
    for(const sn of SUP_NAMES){
      for(const it of state.catalog[sn].items){
        if(String(it.itemNum||'')===String(num)){ it.unitCost=cost; updated++; }
      }
    }
  }
  persist('catalog'); closeModal(); render();
  toast(`${updated} price(s) updated${skipped?`, ${skipped} skipped`:''}`, updated?'ok':'warn');
}

/* ── Order quantity ── */
function setQty(id,v){
  const n = Math.max(0, Math.floor(+v||0));
  if(n>0) state.orderQty[id]=n; else delete state.orderQty[id];
  persist('orderQty'); render();
}
function bumpQty(id,d){
  const n = Math.max(0,(+state.orderQty[id]||0)+d);
  if(n>0) state.orderQty[id]=n; else delete state.orderQty[id];
  persist('orderQty'); render();
}

/* ── Count sheet: area-based running tally ──────────────────────────
   Each area holds a list of entries. Add as many as you want per area
   (e.g. two silverware areas in the restaurant). Entries are deletable,
   so you can re-count one suspicious area without redoing the item.
   Save bar is sticky so the keyboard never hides it.
   ─────────────────────────────────────────────────────────────────── */
let _countTarget=null;
let _countAreas={};        // working copy: {areaName:[entries]}
let _countBegin='', _countAdd='';

function openCount(id){
  _countTarget=id;
  const t = state.trimark[id]||{};
  // Seed working areas from saved data (support old .locs and new .areas)
  const locs = getLocations();
  _countAreas={};
  for(const loc of locs) _countAreas[loc] = [];
  if(t.areas && typeof t.areas==='object'){
    for(const k of Object.keys(t.areas)){
      if(Array.isArray(t.areas[k])) _countAreas[k]=t.areas[k].slice();
    }
  } else if(t.locs && typeof t.locs==='object'){
    for(const k of Object.keys(t.locs)){
      const v=t.locs[k]; if(v!=='' && v!=null && !isNaN(+v)) _countAreas[k]=[+v];
    }
  }
  // ensure every configured location has an array
  for(const loc of locs) if(!Array.isArray(_countAreas[loc])) _countAreas[loc]=[];
  _countBegin = t.begin!=null?String(t.begin):'';
  _countAdd   = t.add!=null?String(t.add):'';
  renderCountSheet();
}

function renderCountSheet(){
  const id=_countTarget;
  const it = state.catalog['TRIMARK'].items.find(i=>i.id===id);
  const locs = getLocations();
  const total = areasTotal(_countAreas);
  const a = analyzeAreas(locs, _countAreas);

  const areaBlocks = locs.map((loc,idx)=>{
    const entries=_countAreas[loc]||[];
    const sub=areaSubtotal(entries);
    const entryRows = entries.map((n,ei)=>`
      <div class="entry">
        <span class="n">${esc(n)}</span>
        <button class="x" onclick="countRemoveEntry('${escJs(loc)}',${ei})">×</button>
      </div>`).join('');
    return `<div class="area-block">
      <div class="area-head">
        <span class="area-name"><span class="area-dot ${sub==null?'off':'on'}"></span>${esc(loc)}</span>
        <span class="area-sub ${sub==null?'unset':''}">${sub==null?'not counted':sub}</span>
      </div>
      ${entryRows}
      <div class="area-add">
        <input inputmode="numeric" id="entry-${idx}" placeholder="count here…"
          onkeydown="if(event.key==='Enter'){countAddEntry('${escJs(loc)}',${idx});}">
        <button onclick="countAddEntry('${escJs(loc)}',${idx})">＋ Add</button>
      </div>
    </div>`;
  }).join('');

  const checklist = a.allBlank ? ''
    : a.anyBlank
      ? `<div class="sched" style="color:var(--low)">⚠ Not counted yet: <b>${a.blank.map(esc).join(', ')}</b></div>`
      : `<div class="sched" style="color:var(--ok)">✓ All ${a.counted.length} areas counted.</div>`;

  // Live breakage preview: Start (begin+add) minus the running total, valued at unit cost.
  const liveRow = trimarkRow(_countBegin, _countAdd, total==null?'':total, it.par, it.unitCost);
  const breakageLine = (total!=null && liveRow.breakageQty>0)
    ? `<div class="sched" style="color:var(--crit);font-weight:600">
        ⚠ ${liveRow.breakageQty} short vs. start
        ${liveRow.breakageValue!=null ? ` — $${liveRow.breakageValue.toFixed(2)} breakage` : ' — set a unit price to see $ value'}
       </div>`
    : '';

  $('modal-root').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="sheet count-sheet"><button class="close" onclick="closeModal()">×</button>
      <h2>${esc(it.name)}</h2>
      <div class="sched">Begin ${it && (_countBegin||0)} · Add ${_countAdd||0} · Par ${it.par??'—'}</div>
      <label class="fl">Count by area — add an entry for each spot within it</label>
      ${areaBlocks}
      <button class="par-tag" style="width:100%;padding:10px;margin:6px 0" onclick="editLocations()">⚙ Edit areas</button>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;
        padding:14px;background:var(--panel2);border-radius:12px">
        <span style="font-size:14px;color:var(--dim)">Total count</span>
        <span style="font-size:30px;font-weight:800;color:var(--accent)">${total==null?'0':total}</span>
      </div>
      ${breakageLine}
      ${checklist}
      <label class="fl">Deliveries received this period (Add)</label>
      <input class="field" inputmode="numeric" id="pad-add" value="${esc(_countAdd)}" placeholder="0"
        onchange="_countAdd=this.value">
      <label class="fl">Begin (carried from last month)</label>
      <input class="field" inputmode="numeric" id="pad-begin" value="${esc(_countBegin)}" placeholder="0"
        onchange="_countBegin=this.value">
      <div class="save-bar"><button class="btn" onclick="countSave()">✓ Save count (${total==null?0:total})</button></div>
    </div></div>`;
}

function escJs(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function countAddEntry(loc, idx){
  const el=$('entry-'+idx); if(!el) return;
  const v=el.value.trim();
  if(v==='' || isNaN(+v)){ el.value=''; return; }
  if(!Array.isArray(_countAreas[loc])) _countAreas[loc]=[];
  _countAreas[loc].push(+v);
  renderCountSheet();
  // re-focus that area's input for fast repeated entry
  const again=$('entry-'+idx); if(again && again.focus) again.focus();
}
function countRemoveEntry(loc, ei){
  if(Array.isArray(_countAreas[loc])) _countAreas[loc].splice(ei,1);
  renderCountSheet();
}
function countSave(){
  const id=_countTarget;
  const locs=getLocations();
  const a=analyzeAreas(locs,_countAreas);
  const doSave=()=>{
    const t=state.trimark[id]||{};
    // store areas (drop empty arrays to keep it tidy) + derived count
    const areas={};
    for(const k of Object.keys(_countAreas)){
      if(Array.isArray(_countAreas[k]) && _countAreas[k].length) areas[k]=_countAreas[k].slice();
    }
    t.areas=areas;
    t.locs=areasToLocs(_countAreas);           // back-compat mirror
    t.count = a.total==null ? '' : a.total;
    t.add   = (+_countAdd||0)||'';
    t.begin = (+_countBegin||0)||'';
    state.trimark[id]=t;
    persist('trimark'); closeModal(); render();
    toast('Count saved','ok');
  };
  if(!a.allBlank && a.anyBlank){
    confirmModal(`${a.blank.length} area(s) not counted: ${a.blank.join(', ')}.\nSave anyway? (they'll count as zero)`, doSave, 'Save anyway');
  } else {
    doSave();
  }
}

/* ── Location management ── */
function editLocations(){
  const locs=getLocations();
  const rows=locs.map((loc,idx)=>`
    <div style="display:flex;gap:8px;margin:6px 0">
      <input class="field" style="margin:0;flex:1" id="locname-${idx}" value="${esc(loc)}">
      <button class="par-tag" style="padding:8px 12px;color:var(--crit)" onclick="removeLocation(${idx})">×</button>
    </div>`).join('');
  modal(`<h2>Storage locations</h2>
    <div class="sched">These are the places you store inventory. Counts are summed across them.</div>
    ${rows}
    <button class="btn ghost" onclick="addLocationRow()">＋ Add location</button>
    <button class="btn" onclick="saveLocations()">Save locations</button>`);
}
let _pendingLocs=null;
function addLocationRow(){
  _pendingLocs = _collectLocNames(); _pendingLocs.push('');
  _rerenderLocEditor();
}
function removeLocation(idx){
  _pendingLocs = _collectLocNames(); _pendingLocs.splice(idx,1);
  if(!_pendingLocs.length) _pendingLocs=['dock'];
  _rerenderLocEditor();
}
function _collectLocNames(){
  const cur=getLocations(); const out=[];
  cur.forEach((_,idx)=>{ const el=$('locname-'+idx); out.push(el?el.value:cur[idx]); });
  return _pendingLocs && _pendingLocs.length ? _pendingLocs.map((v,i)=>{const el=$('locname-'+i);return el?el.value:v;}) : out;
}
function _rerenderLocEditor(){
  const rows=_pendingLocs.map((loc,idx)=>`
    <div style="display:flex;gap:8px;margin:6px 0">
      <input class="field" style="margin:0;flex:1" id="locname-${idx}" value="${esc(loc)}">
      <button class="par-tag" style="padding:8px 12px;color:var(--crit)" onclick="removeLocation(${idx})">×</button>
    </div>`).join('');
  modal(`<h2>Storage locations</h2>
    <div class="sched">These are the places you store inventory. Counts are summed across them.</div>
    ${rows}
    <button class="btn ghost" onclick="addLocationRow()">＋ Add location</button>
    <button class="btn" onclick="saveLocations()">Save locations</button>`);
}
function saveLocations(){
  const src = _pendingLocs && _pendingLocs.length ? _pendingLocs : getLocations();
  const names = src.map((_,idx)=>{const el=$('locname-'+idx); return (el?el.value:'').trim();})
    .filter(Boolean);
  if(!names.length){ toast('Add at least one location','warn'); return; }
  state.locations = [...new Set(names)];   // de-dupe
  _pendingLocs=null;
  persist('locations'); closeModal();
  if(_countTarget){
    // Preserve in-progress entries; add empty arrays for any new areas.
    for(const loc of state.locations) if(!Array.isArray(_countAreas[loc])) _countAreas[loc]=[];
    renderCountSheet();
  } else render();
  toast('Areas saved','ok');
}

/* ── Save order to history ── */
function saveOrder(sn){
  const items = state.catalog[sn].items
    .map(it=>({id:it.id,name:it.name,itemNum:it.itemNum||'',orderQty:+state.orderQty[it.id]||0}))
    .filter(i=>i.orderQty>0);
  if(!items.length){ toast('Nothing to save — no quantities entered','warn'); return; }
  const rec = {
    date:new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}),
    supplier:sn, type:'order', items, ts:Date.now()
  };
  state.history.unshift(rec);
  state.learning = recordLearning(state.learning, rec);   // data only, no prediction
  for(const it of state.catalog[sn].items) delete state.orderQty[it.id];
  persist('history'); persist('learning'); persist('orderQty'); render(); toast('Saved to history','ok');
}

function saveInventory(){
  const counted = state.catalog['TRIMARK'].items.filter(it=>{
    const t=state.trimark[it.id]||{}; return t.count!=null && t.count!=='';
  }).length;
  const totalItems = state.catalog['TRIMARK'].items.length;
  confirmModal(`Save this month's inventory and reset counts?\n${counted} of ${totalItems} items counted.\nCounts roll into next month's Begin.`, ()=>{
    const items = state.catalog['TRIMARK'].items.map(it=>{
      const t=state.trimark[it.id]||{};
      const r=trimarkRow(t.begin,t.add,t.count,it.par,it.unitCost);
      return {id:it.id,name:it.name,begin:t.begin||0,add:t.add||0,count:r.counted,
        used:r.used,orderQty:r.order||0,par:it.par,unitCost:it.unitCost??null,
        breakageQty:r.breakageQty, breakageValue:r.breakageValue};
    });
    state.history.unshift({
      date:new Date().toLocaleString('en-US',{month:'long',year:'numeric'}),
      supplier:'TRIMARK', type:'inventory', items, ts:Date.now()
    });
    // Roll count -> next begin, clear add/count/areas for the fresh month
    const next={};
    for(const it of state.catalog['TRIMARK'].items){
      const t=state.trimark[it.id]||{};
      const r=trimarkRow(t.begin,t.add,t.count,it.par,it.unitCost);
      if(r.counted!=null) next[it.id]={begin:r.counted,add:'',count:'',areas:{}};
    }
    state.trimark=next;
    persist('history'); persist('trimark'); render(); toast('Month saved · counts rolled forward','ok');
  }, 'Save month');
}

function openRecord(idx){
  const h=state.history[idx]; if(!h) return;
  const rows=(h.items||[]).filter(i=>(+i.orderQty||0)>0||i.count!=null).map(i=>{
    const detail = h.type==='inventory'
      ? `count ${i.count??'—'} · used ${i.used??'—'} · order ${i.orderQty}`
      : `qty ${i.orderQty}`;
    return `<div class="item"><div class="item-main">
      <div class="item-name">${esc(i.name)}</div>
      <div class="item-meta">${detail}</div></div></div>`;
  }).join('');
  modal(`<h2>${esc(h.supplier)} — ${esc(h.type)}</h2>
    <div class="sched">${esc(h.date)}</div>${rows||'<div class="empty">No items.</div>'}
    ${h.type==='order'?`<button class="btn" onclick="resendRecord(${idx})">↻ Re-send this order</button>`:''}
    <button class="btn ghost" onclick="deleteRecord(${idx})">🗑 Delete record</button>`);
}
function deleteRecord(idx){
  confirmModal('Delete this record permanently?', ()=>{
    state.history.splice(idx,1); persist('history'); closeModal(); render();
  }, 'Delete');
}
function resendRecord(idx){
  const h=state.history[idx]; if(!h) return;
  closeModal(); _sendFromItems(h.supplier, h.items);
}

/* ═══════════════════════════════════════════════════════════════════
   6. ORDER CHANNELS  (SMS / CSV / email — your exact formats)
   ═══════════════════════════════════════════════════════════════════ */
function sendOrder(sn){
  let items;
  if(sn==='TRIMARK' && state.tab==='inventory'){
    items = state.catalog['TRIMARK'].items.map(it=>{
      const t=state.trimark[it.id]||{}; const r=trimarkRow(t.begin,t.add,t.count,it.par,it.unitCost);
      return {name:it.name,itemNum:it.itemNum||'',orderQty:r.order||0};
    }).filter(i=>i.orderQty>0);
  } else {
    items = state.catalog[sn].items
      .map(it=>({name:it.name,itemNum:it.itemNum||'',orderQty:+state.orderQty[it.id]||0}))
      .filter(i=>i.orderQty>0);
  }
  if(!items.length){ toast('No items with quantity to send','warn'); return; }
  _sendFromItems(sn, items);
}

function _sendFromItems(sn, items){
  items = (items||[]).filter(i=>(+i.orderQty||0)>0);
  if(!items.length){ toast('No items to send','warn'); return; }
  if(sn==='ABCO')   return sendAbcoSms(items);
  if(sn==='BEK')    return downloadBekCsv(items);
  return sendEmail(sn, items);   // TRIMARK, AMAZON, ELECTRICAL
}

function sendAbcoSms(items){
  const lines = items.map(i=>`-x${i.orderQty} ${i.name}`);
  const groups=[]; for(let i=0;i<lines.length;i+=3) groups.push(lines.slice(i,i+3).join('\n'));
  const body=`Hi Hal, ABCO order:\n\n${groups.join('\n\n')}\n\nThanks`;
  window.location.href=`sms:5128015422&body=${encodeURIComponent(body)}`;
}

function downloadBekCsv(items){
  const rows=['Item#,Each,Quantity']; const missing=[];
  items.forEach(i=>{
    const num=getBekItemNum(i); const q=+i.orderQty||0;
    if(num && q>0) rows.push(`${num},Each,${q}`); else if(q>0) missing.push(i.name);
  });
  if(missing.length) toast(`⚠ ${missing.length} missing BEK#: ${missing.join(', ')}`,'warn');
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const d=new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'}).replace(/\//g,'-');
  const a=document.createElement('a'); a.href=url; a.download=`BEK-order-${d}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('BEK CSV downloaded','ok');
}
function getBekItemNum(item){
  if(item.itemNum) return item.itemNum;
  const cat=state.catalog['BEK'].items;
  const byId=cat.find(c=>c.id===item.id); if(byId?.itemNum) return byId.itemNum;
  const byName=cat.find(c=>c.name===item.name); if(byName?.itemNum) return byName.itemNum;
  return '';
}

function sendEmail(sn, items){
  const c=DEFAULT_SUPPLIERS[sn];
  const to = (c.contact.match(/[\w.+-]+@[\w-]+\.[\w.-]+/)||[''])[0] || (c.email||'');
  const subject=`Bartlett's ${sn} order — ${new Date().toLocaleDateString()}`;
  const body=`Hello,\n\nPlease process the following order for Bartlett's:\n\n`+
    items.map(i=>`${i.orderQty} × ${i.name}${i.itemNum?` (#${i.itemNum})`:''}`).join('\n')+
    `\n\nThank you,\nBartlett's Restaurant`;
  window.location.href=`mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

/* ═══════════════════════════════════════════════════════════════════
   7. MODAL + TOAST
   ═══════════════════════════════════════════════════════════════════ */
function modal(html){
  $('modal-root').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="sheet"><button class="close" onclick="closeModal()">×</button>${html}</div></div>`;
}
function closeModal(){ $('modal-root').innerHTML=''; }

// In-app confirmation (iOS PWAs can silently block native confirm()).
let _confirmCb=null;
function confirmModal(msg, onYes, yesLabel){
  _confirmCb=onYes;
  $('modal-root').innerHTML=`<div class="overlay" onclick="if(event.target===this)_confirmNo()">
    <div class="sheet" style="max-width:420px">
      <h2>Please confirm</h2>
      <div class="sched" style="font-size:15px;white-space:pre-line;margin-bottom:8px">${esc(msg)}</div>
      <button class="btn" onclick="_confirmYes()">${esc(yesLabel||'Yes, continue')}</button>
      <button class="btn ghost" onclick="_confirmNo()">Cancel</button>
    </div></div>`;
}
function _confirmYes(){ const cb=_confirmCb; _confirmCb=null; closeModal(); if(cb) cb(); }
function _confirmNo(){ _confirmCb=null; closeModal(); }
let _toastT=null;
function toast(msg,kind){
  clearTimeout(_toastT);
  const el=document.createElement('div'); el.className='toast'+(kind?' '+kind:'');
  el.textContent=msg; document.body.appendChild(el);
  _toastT=setTimeout(()=>el.remove(),2600);
}

function setSync(status){
  const el=$('sync'); if(!el) return;
  el.className='sync-badge '+status;
  el.querySelector('span:last-child').textContent=status;
}
function initFirebase(){
  if(typeof firebase==='undefined'){ setTimeout(initFirebase,1500); return; }
  try{
    if(!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
    fbDb=firebase.database();
    setSync('syncing');
    firebase.auth().signInAnonymously()
      .then(startListeners)
      .catch(e=>{ console.warn('auth',e); setSync('error'); });
  }catch(e){ console.warn('fb init',e); setSync('error'); }
}
function startListeners(){
  setSync('synced');
  // One-time migration: if v2 has no history yet, try reading old v1 paths.
  maybeMigrate();
  const bind=(path, apply)=>{
    fbDb.ref(path).on('value', snap=>{
      if(isEchoing(path)) return;          // ignore our own just-written echo
      const val=snap.val(); if(val==null) return;
      apply(val); lsSet(path, val); render();
    });
  };
  bind('deletedIds', v=>{ state.deletedIds=v; });
  bind('locations', v=>{ if(Array.isArray(v)&&v.length) state.locations=v; });
  bind('catalog',  v=>mergeCatalog(v));
  bind('orderQty', v=>{ state.orderQty=v; });
  bind('onHand',   v=>{ state.onHand=v; });
  bind('trimark',  v=>{ state.trimark=v; });
  bind('cog',      v=>{ state.cog={sales:{},manual:{},...v}; });
  bind('learning', v=>{ state.learning=v; });
  bind('history',  v=>{ if(Array.isArray(v)) state.history=v;
                        else if(v&&typeof v==='object') state.history=Object.values(v); });
  fbDb.ref('.info/connected').on('value', s=> setSync(s.val()?'synced':'offline'));
}

// Read old v1 paths ONCE and migrate into v2 shapes — only if v2 is empty.
function maybeMigrate(){
  const alreadyMigrated = lsGet('migrated-v1-to-v2');
  if(alreadyMigrated) return;
  if(state.history.length || Object.keys(state.trimark).length){
    lsSet('migrated-v1-to-v2', true); return;   // v2 already has data; don't overwrite
  }
  const oldPaths=['catalog','history','trimarkBegin','trimarkAdd','trimarkTally','cogSales','cogManual','learning'];
  Promise.all(oldPaths.map(p=>fbDb.ref(p).once('value').then(s=>[p,s.val()]).catch(()=>[p,null])))
    .then(entries=>{
      const old={}; for(const [p,v] of entries) if(v!=null) old[p]=v;
      if(!Object.keys(old).length){ lsSet('migrated-v1-to-v2', true); return; }
      // SAFETY: back up the exact raw old-shape data to its own path BEFORE
      // converting, since 'catalog'/'history'/'learning' are shared path names
      // between old and new schemas — without this backup, the pre-migration
      // data would be gone the moment we write the converted version back.
      fbDb.ref('backup-pre-v2-migration').set({...old, backedUpAt:Date.now()});
      const did = migrateFromV1(old);
      if(did){
        ['catalog','history','trimark','cog','learning'].forEach(k=>persist(k));
        toast('Imported your existing data (backup saved)','ok');
      }
      lsSet('migrated-v1-to-v2', true);
      render();
    });
}
